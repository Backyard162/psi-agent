name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run ty check .

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - run: uv sync
      - run: uv run pytest -v
        env:
          PSI_TEST_OPENAI_API_KEY: ${{ secrets.PSI_TEST_OPENAI_API_KEY }}
          PSI_TEST_OPENAI_BASE_URL: ${{ secrets.PSI_TEST_OPENAI_BASE_URL }}
          PSI_TEST_OPENAI_MODEL: ${{ secrets.PSI_TEST_OPENAI_MODEL }}
          PSI_TEST_ANTHROPIC_API_KEY: ${{ secrets.PSI_TEST_ANTHROPIC_API_KEY }}
          PSI_TEST_ANTHROPIC_BASE_URL: ${{ secrets.PSI_TEST_ANTHROPIC_BASE_URL }}
          PSI_TEST_ANTHROPIC_MODEL: ${{ secrets.PSI_TEST_ANTHROPIC_MODEL }}

  publish:
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
