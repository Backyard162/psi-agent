name: Upstream Watch

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6,18 * * *"   # UTC 06:00 / 18:00
  workflow_dispatch:           # 手动触发

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          repository: Backyard162/psi-agent
          ref: feat/call-subcommand
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/genuineknowledge/psi-agent.git
          GIT_TERMINAL_PROMPT=0 timeout 30 git fetch upstream main \
            || echo "Warning: upstream fetch failed"

      - name: Detect conflicts
        id: detect
        run: |
          git rev-parse upstream/main &>/dev/null || {
            echo "conflict=" >> "$GITHUB_OUTPUT"
            exit 0
          }

          MERGE_BASE=$(git merge-base HEAD upstream/main)
          UPSTREAM_TIP=$(git rev-parse upstream/main)

          if [ "$MERGE_BASE" = "$UPSTREAM_TIP" ]; then
            echo "conflict=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          OUR_FILES=$(git diff --name-only "$MERGE_BASE"..HEAD)
          UPSTREAM_FILES=$(git diff --name-only "$MERGE_BASE"..upstream/main)
          CONFLICT=$(comm -12 <(echo "$OUR_FILES" | sort -u) <(echo "$UPSTREAM_FILES" | sort -u))

          {
            echo "conflict<<DELIM"
            echo "$CONFLICT"
            echo "DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Warn on conflict
        if: steps.detect.outputs.conflict != ''
        env:
          CONFLICT: ${{ steps.detect.outputs.conflict }}
        run: |
          echo "::warning::上游 main 改动了以下重叠文件，建议及时 rebase："
          while IFS= read -r f; do
            echo "::warning::  • $f"
          done <<< "$CONFLICT"
          echo ""
          echo "建议执行："
          echo "  git fetch upstream main"
          echo "  git rebase upstream/main"
