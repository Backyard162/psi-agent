name: Upstream Watch

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6,18 * * *"   # UTC 06:00 / 18:00
  workflow_dispatch:           # 手动触发

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          repository: Backyard162/psi-agent
          ref: feat/call-subcommand
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/genuineknowledge/psi-agent.git
          GIT_TERMINAL_PROMPT=0 timeout 30 git fetch upstream main || echo "Warning: upstream fetch failed, skipping"

      - name: Detect conflicts
        id: detect
        run: |
          git rev-parse upstream/main &>/dev/null || {
            echo "NO_CHANGE=true" >> "$GITHUB_ENV"
            echo "conflict=" >> "$GITHUB_OUTPUT"
            exit 0
          }

          MERGE_BASE=$(git merge-base HEAD upstream/main)
          UPSTREAM_TIP=$(git rev-parse upstream/main)

          if [ "$MERGE_BASE" = "$UPSTREAM_TIP" ]; then
            echo "NO_CHANGE=true" >> "$GITHUB_ENV"
            echo "conflict=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          OUR_FILES=$(git diff --name-only "$MERGE_BASE"..HEAD)
          UPSTREAM_FILES=$(git diff --name-only "$MERGE_BASE"..upstream/main)
          CONFLICT=$(comm -12 <(echo "$OUR_FILES" | sort -u) <(echo "$UPSTREAM_FILES" | sort -u))

          echo "NO_CHANGE=false" >> "$GITHUB_ENV"
          {
            echo "conflict<<DELIM"
            echo "$CONFLICT"
            echo "DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update Issue
        if: env.NO_CHANGE == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          CONFLICT: ${{ steps.detect.outputs.conflict }}
        run: |
          TITLE="[Auto] 上游文件变更告警"
          BODY="## 上游 main 新增了 commit，涉及以下重叠文件：\n\n${CONFLICT}\n\n### 建议操作\n\`\`\`\ngit fetch upstream main\ngit rebase upstream/main\n\`\`\`\n\n_自动检测于 $(date -u +'%Y-%m-%d %H:%M UTC')_"

          EXISTING=$(gh issue list \
            --repo Backyard162/psi-agent \
            --label upstream-watch \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null) || EXISTING=""

          if [ -n "$EXISTING" ]; then
            gh issue update "$EXISTING" \
              --repo Backyard162/psi-agent \
              --title "$TITLE" \
              --body "$BODY"
          else
            gh issue create \
              --repo Backyard162/psi-agent \
              --title "$TITLE" \
              --body "$BODY" \
              --label upstream-watch
          fi

      - name: Close resolved Issue
        if: env.NO_CHANGE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh issue list \
            --repo Backyard162/psi-agent \
            --label upstream-watch \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null) || EXISTING=""

          if [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" \
              --repo Backyard162/psi-agent \
              --comment "上游冲突已解决，自动关闭。"
          fi
